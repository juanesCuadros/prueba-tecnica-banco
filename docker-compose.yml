version: '3.8'

services:
  postgres-cliente:
    image: postgres:15-alpine
    container_name: postgres-cliente
    environment:
      POSTGRES_DB: bancodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata-cliente:/var/lib/postgresql/data
      - ./BaseDatos.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-cuenta:
    image: postgres:15-alpine
    container_name: postgres-cuenta
    environment:
      POSTGRES_DB: cuentadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata-cuenta:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cliente-persona-service:
    build:
      context: ./cliente-persona-service
      dockerfile: Dockerfile
    container_name: cliente-persona-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres-cliente
      DB_NAME: bancodb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres-cliente:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  cuenta-movimiento-service:
    build:
      context: ./cuenta-movimiento-service
      dockerfile: Dockerfile
    container_name: cuenta-movimiento-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-cuenta
      DB_NAME: cuentadb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres-cuenta:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata-cliente:
  pgdata-cuenta:
